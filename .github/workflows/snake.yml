name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: Platane/snk@v3
        with:
          github_user_name: ClaraDev01
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=FFB7C5&color_dots=#2d1b2e,#6b2d5e,#c4648a,#e891b0,#FFB7C5
            dist/github-contribution-grid-snake-dark.svg?color_snake=FFB7C5&color_dots=#2d1b2e,#6b2d5e,#c4648a,#e891b0,#FFB7C5&palette=github-dark
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
